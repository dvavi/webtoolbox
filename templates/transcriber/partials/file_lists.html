<div class="row g-4">
  <div class="col-12 col-lg-6">
    <div class="card shadow-sm h-100">
      <div class="card-header">Audio Files</div>
      <div class="card-body p-0">
        <div class="p-3 border-bottom">
          <div class="row g-2 align-items-center">
            <div class="col-12 col-md-7">
              <input id="rename-input" class="form-control form-control-sm" placeholder="New name for selected single file">
            </div>
            <div class="col-12 col-md-5 d-grid gap-2 d-md-flex justify-content-md-end">
              <button id="audio-rename-button" class="btn btn-sm btn-outline-primary">Rename</button>
              <button id="audio-delete-button" class="btn btn-sm btn-outline-danger">Delete</button>
              <button id="audio-transcribe-button" class="btn btn-sm btn-success">Transcribe</button>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0">
            <thead>
              <tr>
                <th style="width: 40px;"><input id="select-all-audio" type="checkbox"></th>
                <th>Name</th>
              </tr>
            </thead>
            <tbody>
              {% for file in audio_files %}
              <tr>
                <td><input type="checkbox" name="selected_files" value="{{ file }}"></td>
                <td>{{ file }}</td>
              </tr>
              {% else %}
              <tr>
                <td colspan="2" class="text-center text-muted py-3">No audio files found</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-6">
    <div class="card shadow-sm h-100">
      <div class="card-header">Transcript Files</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0">
            <thead>
              <tr>
                <th>Name</th>
                <th class="text-end">Download</th>
              </tr>
            </thead>
            <tbody>
              {% for file in text_files %}
              <tr>
                <td>{{ file }}</td>
                <td class="text-end">
                  <a class="btn btn-sm btn-outline-secondary" href="/tools/transcriber/download/text/{{ file }}">Download</a>
                </td>
              </tr>
              {% else %}
              <tr>
                <td colspan="2" class="text-center text-muted py-3">No transcripts found</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card shadow-sm mt-4">
  <div class="card-body">
    <h3 class="h5 mb-3">Transcode Progress</h3>

    <div id="progress-panel" class="mt-3 d-none">
      <div class="progress" role="progressbar" aria-label="Transcription progress">
        <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
      </div>
      <p id="progress-message" class="small text-muted mt-2 mb-0">Waiting...</p>
      <div id="job-list" class="mt-3"></div>
    </div>
  </div>
</div>
